# =============================================================================
# litellm-config.yaml
# =============================================================================
# vLLM is started with --served-model-name qwen3.6-35b-a3b
# So ALL litellm_params.model references must use: hosted_vllm/qwen3.6-35b-a3b
#
# Model: nvidia/Qwen3.6-35B-A3B-NVFP4
#   35B MoE (3B activated), NVFP4 quantized
#   Engine port: 8301
#   Vision support: no (text-only MoE checkpoint; no vision encoder)
#   Reasoning parser: qwen3 (required to prevent thinking tokens in output)
#   max-model-len: 131072 (GB10-tuned; raise to 262144 in vLLM if stable)
#
# Changes vs qwen3.6-27b config:
#   model references: qwen3.6-27b → qwen3.6-35b-a3b
#   api_base:         qwen3-6-27b-engine → qwen3-6-35b-nvfp4-engine
#   max_tokens:       262144 → 131072 (matches GB10-tuned --max-model-len)
#   max_input_tokens: 262144 → 131072
#   supports_vision:  true → false (NVFP4 MoE checkpoint has no vision encoder)
#   added: llama-nemotron-embed-vl-1b-v2 embedding model (docker-compose.qwen3.6.yml, port 8302)
#   removed: claude-sonnet-4-6 / claude-haiku-4-6 Claude Code proxy aliases
# =============================================================================

model_list:

  # ── Other agents: friendly name ─────────────────────────────────────────────
  # Full context window — use this alias when you want the full 131K
  - model_name: qwen3.6-35b-a3b
    litellm_params:
      model: hosted_vllm/qwen3.6-35b-a3b
      api_base: http://qwen3-6-35b-nvfp4-engine:8000/v1
      api_key: "none"
    model_info:
      max_tokens: 131072
      max_input_tokens: 131072
      max_output_tokens: 16384
      supports_tool_choice: true
      supports_function_calling: true
      supports_vision: false
      input_cost_per_token: 0.000000015
      output_cost_per_token: 0.000000035

  # ── Qwen3-Coder-Next (separate compose: docker-compose.yml) ─────────────────
  - model_name: qwen3-coder-next
    litellm_params:
      model: hosted_vllm/qwen3-coder-next
      api_base: http://qwen3-coder-next-engine:8000/v1
      api_key: "none"
    model_info:
      max_tokens: 262144
      max_input_tokens: 262144
      max_output_tokens: 16384
      supports_tool_choice: true
      supports_function_calling: true
      supports_vision: false
      input_cost_per_token: 0.000000015
      output_cost_per_token: 0.000000035

  # ── Nemotron (separate compose) ─────────────────────────────────────────────
  - model_name: nemotron-super
    litellm_params:
      model: openai/nemotron-super
      api_base: http://nemotron-engine:8000/v1
      api_key: "none"
    model_info:
      max_tokens: 32768
      max_input_tokens: 32768
      max_output_tokens: 8192
      supports_tool_choice: true
      supports_function_calling: true
      supports_vision: false
      input_cost_per_token: 0.000000015
      output_cost_per_token: 0.000000035

  # ── Embedding: nvidia/llama-nemotron-embed-vl-1b-v2 ─────────────────────────
  # Multimodal (text/image/image+text) embedding model, 2048-dim output.
  # Runs alongside the chat engine (docker-compose.qwen3.6.yml, port 8302) —
  # small enough not to need exclusive GPU access like the main chat models.
  # Call via POST /v1/embeddings. For text: {"input": "query text"}.
  # For image/image+text, pass OpenAI-style content parts (image_url + text)
  # since the backend is an image-capable VLM embedder, not a text-only model.
  - model_name: llama-nemotron-embed-vl-1b-v2
    litellm_params:
      model: hosted_vllm/llama-nemotron-embed-vl-1b-v2   # matches --served-model-name
      api_base: http://nemotron-embed-vl-engine:8000/v1
      api_key: "none"
    model_info:
      mode: embedding
      max_input_tokens: 10240                            # image+text combined limit
      output_vector_size: 2048
      supports_vision: true
      input_cost_per_token: 0.000000015

litellm_settings:
  drop_params: true
  drop_unsupported_params: true
  modify_params: true
  request_timeout: 600
  stream_timeout: 300
  num_retries: 3
  turn_off_message_logging: false
  callbacks: ["langfuse_otel"]

  # Redis exact-match prompt cache
  # ttl=3600: cached responses expire after 1 hour.
  # Pairs with vLLM prefix cache: vLLM handles partial prefix reuse,
  # LiteLLM short-circuits 100%-identical requests before vLLM is called.
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_AUTH
    ttl: 3600
    supported_call_types:
      - acompletion
      - completion

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  litellm_salt_key: os.environ/LITELLM_SALT_KEY
  disable_spend_logs: false
  database_connection_pool_limit: 10
  enable_responses_api: false