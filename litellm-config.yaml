# =============================================================================
# litellm-config.yaml
# =============================================================================
# vLLM is started with --served-model-name qwen3.6-35b-a3b
# So ALL litellm_params.model references must use: openai/qwen3.6-35b-a3b
#
# Model: nvidia/Qwen3.6-35B-A3B-NVFP4
#   35B MoE (3B activated), NVFP4 quantized
#   Engine port: 8301
#   Vision support: no (text-only MoE checkpoint; no vision encoder)
#   Reasoning parser: qwen3 (required to prevent thinking tokens in output)
#   max-model-len: 262144 (vLLM --max-model-len; full context window)
#
# Changes vs qwen3.6-27b config:
#   model references: qwen3.6-27b → qwen3.6-35b-a3b
#   api_base:         qwen3-6-27b-engine → qwen3-6-35b-nvfp4-engine
#   max_tokens:       262144 (matches vLLM --max-model-len)
#   max_input_tokens: 262144
#   supports_vision:  true → false (NVFP4 MoE checkpoint has no vision encoder)
#   added: nemotron-3-embed-1b-nvfp4 embedding model (docker-compose.qwen3.6.yml, port 8302)
#   removed: claude-sonnet-4-6 / claude-haiku-4-6 Claude Code proxy aliases
# =============================================================================

model_list:

  # ── Anthropic passthrough ────────────────────────────────────────────────────
  # Wildcard: forwards any Claude model ID (including future releases and any
  # alias Claude Code/Desktop introduces) straight to Anthropic's real API.
  # Do NOT enumerate individual claude-* model IDs here — that defeats the point.
  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Other agents: friendly name ─────────────────────────────────────────────
  # Full context window — use this alias when you want the full 131K
  - model_name: qwen3.6-35b-a3b
    litellm_params:
      model: openai/qwen3.6-35b-a3b
      api_base: http://qwen3-6-35b-nvfp4-engine:8000/v1
      api_key: "none"
    model_info:
      max_tokens: 262144
      max_input_tokens: 262144
      max_output_tokens: 262144
      supports_tool_choice: true
      supports_function_calling: true
      supports_vision: false
      input_cost_per_token: 0.000000015
      output_cost_per_token: 0.000000035

  # ── Embedding: nvidia/Nemotron-3-Embed-1B-NVFP4 ──────────────────────────────
  # Text-only embedding model, 2048-dim output, NVFP4 quantized.
  # Runs alongside the chat engine (docker-compose.qwen3.6.yml, port 8302) —
  # small enough not to need exclusive GPU access like the main chat models.
  # Call via POST /v1/embeddings, e.g. {"input": "query: some text"}.
  # Callers MUST manually prefix input with "query:" or "passage:" — this
  # model uses asymmetric query/passage embedding (no vision support, unlike
  # the llama-nemotron-embed-vl-1b-v2 model it replaces).
  - model_name: nemotron-3-embed-1b-nvfp4
    litellm_params:
      model: openai/nemotron-3-embed-1b-nvfp4   # matches --served-model-name
      api_base: http://nemotron-embed-engine:8000/v1
      api_key: "none"
      # Pinned default: when the caller omits encoding_format, LiteLLM
      # forwards it as a literal `null` rather than omitting the field.
      # vLLM's embeddings endpoint has a strict pydantic validator that
      # rejects null (only "float"/"base64"/"bytes"/"bytes_only" are
      # accepted), causing every unprefixed-encoding_format request to fail
      # with a 400. Pinning it here forces a valid value on every call.
      encoding_format: "float"
    model_info:
      mode: embedding
      max_input_tokens: 4096                             # matches --max-model-len
      output_vector_size: 2048
      supports_vision: false
      input_cost_per_token: 0.000000015

litellm_settings:
  drop_params: true
  drop_unsupported_params: true
  modify_params: true
  request_timeout: 600
  stream_timeout: 300
  num_retries: 3
  # Catch-all: if a model group fails (after num_retries) and has no specific
  # entry in `fallbacks`, retry against the local Qwen3.6 engine. Applies to
  # anthropic/* passthrough failures (Anthropic API down/rate-limited) as well
  # as any other unmapped model group.
  default_fallbacks: ["qwen3.6-35b-a3b"]
  turn_off_message_logging: false
  callbacks: ["langfuse_otel"]

  # Redis exact-match prompt cache
  # ttl=3600: cached responses expire after 1 hour.
  # Pairs with vLLM prefix cache: vLLM handles partial prefix reuse,
  # LiteLLM short-circuits 100%-identical requests before vLLM is called.
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_AUTH
    ttl: 3600
    supported_call_types:
      - acompletion
      - completion

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  litellm_salt_key: os.environ/LITELLM_SALT_KEY
  disable_spend_logs: false
  database_connection_pool_limit: 10
  enable_responses_api: false